<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Zone Overlap</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { margin: 20px; }
        label { display: block; margin: 10px 0 5px; }
        input { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Time Zone Overlap Calculator</h1>
    <form method="post">
        <label for="tz1">Time Zone 1:</label>
        <input type="text" id="tz1" name="tz1" required>

        <label for="start1">Start Time 1 (HH:MM):</label>
        <input type="time" id="start1" name="start1" required>

        <label for="end1">End Time 1 (HH:MM):</label>
        <input type="time" id="end1" name="end1" required>

        <label for="tz2">Time Zone 2:</label>
        <input type="text" id="tz2" name="tz2" required>

        <label for="start2">Start Time 2 (HH:MM):</label>
        <input type="time" id="start2" name="start2" required>

        <label for="end2">End Time 2 (HH:MM):</label>
        <input type="time" id="end2" name="end2" required>

        <button type="submit">Calculate</button>
    </form>

    {% if overlap is not none %}
    <h2>Overlap Duration: {{ overlap }} hours</h2>
    {% endif %}
</body>
</html>
