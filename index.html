<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Zone Overlap Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Time Zone Overlap Checker</h1>

    <!-- Mode toggle -->
    <div class="mode-toggle" role="group" aria-label="Input mode">
      <button id="mode-form" class="mode-btn active" type="button">Dropdowns</button>
      <button id="mode-map"  class="mode-btn"        type="button">World Map</button>
    </div>

    <div class="panels" id="form-panels">
      <!-- Home panel -->
      <div class="panel panel-tz1">
        <h2>Home Timezone</h2>
        <div class="field tz-field">
          <label for="tz1">Timezone</label>
          <select id="tz1" name="tz1"></select>
        </div>
        <!-- Shown only in map mode -->
        <div class="map-tz-tag hidden" id="tz1-tag">Click map to select</div>
        <div class="field-row">
          <div class="field">
            <label for="start1">Start</label>
            <input type="time" id="start1" name="start1">
          </div>
          <div class="field">
            <label for="end1">End</label>
            <input type="time" id="end1" name="end1">
          </div>
        </div>
      </div>

      <!-- Away panel -->
      <div class="panel panel-tz2">
        <h2>Away Timezone</h2>
        <div class="field tz-field">
          <label for="tz2">Timezone</label>
          <select id="tz2" name="tz2"></select>
        </div>
        <!-- Shown only in map mode -->
        <div class="map-tz-tag hidden" id="tz2-tag">Click map to select</div>
        <div class="field-row">
          <div class="field">
            <label for="start2">Start</label>
            <input type="time" id="start2" name="start2">
          </div>
          <div class="field">
            <label for="end2">End</label>
            <input type="time" id="end2" name="end2">
          </div>
        </div>
      </div>
    </div>

    <!-- Map container (hidden in form mode) -->
    <div id="map-container" class="map-container hidden"></div>

    <!-- Calculate button (hidden in map mode) -->
    <div class="actions" id="form-actions">
      <button id="calculate" type="button">Calculate Overlap</button>
    </div>

    <div id="results" class="results hidden">
      <div id="overlap-summary" class="overlap-summary"></div>
      <div id="timeline"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="map.js"></script>
</body>
</html>
